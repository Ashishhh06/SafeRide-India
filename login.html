<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeRide India</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛡️ SafeRide India</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="city-selection.html">Live Routes</a>
            </nav>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="text-center" style="margin-bottom:36px;">
                <div style="font-size:48px;margin-bottom:16px;">🔐</div>
                <h1 style="font-size:26px;font-weight:800;margin-bottom:8px;">Welcome Back</h1>
                <p style="color:var(--text-muted);font-size:15px;">Sign in to manage your transit experience</p>
            </div>

            <!-- Login error message -->
            <div id="loginError" class="error-msg" style="display:none;margin-bottom:18px;"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label>Email / Phone Number</label>
                    <input type="text" id="emailInput" placeholder="Enter any email or phone" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passInput" placeholder="Enter any password (demo)" required autocomplete="current-password">
                </div>
                <div style="text-align:right;margin-bottom:24px;">
                    <a href="#" style="font-size:13px;color:var(--primary);font-weight:500;">Forgot password?</a>
                </div>
                <button type="submit" id="loginBtn" class="btn primary-btn" style="width:100%;padding:15px;font-size:16px;">
                    Log In →
                </button>
            </form>

            <!-- Demo hint -->
            <div style="margin-top:18px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;font-size:13px;color:#166534;">
                <strong>Demo Mode:</strong> Enter any email/phone and any password to continue.
            </div>

            <div class="text-center" style="margin-top:24px;">
                <p style="font-size:14px;color:var(--text-muted);">
                    New user? <a href="#" style="color:var(--primary);font-weight:600;">Create an account</a>
                </p>
                <p style="font-size:13px;color:var(--text-muted);margin-top:12px;">
                    Or <a href="city-selection.html" style="color:var(--primary);font-weight:600;">browse without login →</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/appState.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
