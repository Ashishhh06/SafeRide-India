<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips | SafeRide India</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛡️ SafeRide India</a>
            <nav>
                <span id="navCityBadge" class="city-badge"></span>
                <a href="index.html">Home</a>
                <a href="city-selection.html">Live Routes</a>
                <a href="mytrips.html" class="active">My Trips</a>
                <a href="report.html">Report</a>
                <a href="login.html" class="login-btn">Login</a>

    <main class="container section-padding">

        </div>
        <div

        <div id="tripsContainer">
            <div class="card text-center">
                <p>Loading...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2024 SafeRide India | Multi-City Smart Transit</p>
        </div>
    </footer>
    <script src="js/data.js"></script>
